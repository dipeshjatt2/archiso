name: BhagwaOS Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Arch Linux Environment
        uses: RangHo/setup-arch@v1
        with:
          # We need these packages to build the ISO
          packages: archiso git base-devel

      - name: Build BhagwaOS ISO
        shell: arch.sh {0}
        run: |
          # 1. Initialize keys
          pacman-key --init
          pacman-key --populate archlinux

          # 2. Add Chaotic-AUR for Calamares
          echo -e "\n[chaotic-aur]\nSigLevel = Never\nServer = https://cdn-mirror.chaotic.cx/\$repo/\$arch" >> /etc/pacman.conf
          pacman -Sy --noconfirm

          # 3. Build the ISO
          # -v (Verbose), -w (Work dir), -o (Output dir)
          mkarchiso -v -w /tmp/archiso-tmp -o ./output ./profile

      - name: Upload BhagwaOS ISO
        uses: actions/upload-artifact@v4
        with:
          name: BhagwaOS-Live-ISO
          path: output/*.iso
