name: BhagwaOS Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Arch Linux Environment
        uses: RangHo/setup-arch@v1
        with:
          packages: archiso git base-devel wget

      - name: Build BhagwaOS ISO
        shell: arch.sh {0}
        run: |
          # 1. Initialize Keys
          sudo pacman-key --init
          sudo pacman-key --populate archlinux

          # 2. Sync standard repositories
          sudo pacman -Sy --noconfirm

          # 3. Prepare Profile Structure
          # Copying the official Arch templates
          cp -rv /usr/share/archiso/configs/releng/* ./profile/
          
          # Restore your custom files from your repository
          git checkout ./profile/packages.x86_64
          git checkout ./profile/profiledef.sh
          git checkout ./profile/pacman.conf

          # 4. Cleanup: Remove any leftover Calamares/Chaotic references
          # This ensures the build doesn't fail if you forgot to edit the file manually
          sed -i '/calamares/d' profile/packages.x86_64
          sed -i '/chaotic/d' profile/packages.x86_64

          # 5. Bootloader Sanity Check
          # Ensuring essential boot packages are present for validation
          for pkg in syslinux memtest86+ memtest86+-efi edk2-shell; do
            grep -qxF "$pkg" profile/packages.x86_64 || echo "$pkg" >> profile/packages.x86_64
          done

          # 6. Fix Directory Structure
          mkdir -p profile/airootfs/etc/sudoers.d
          mkdir -p profile/airootfs/root
          if [ ! -f profile/airootfs/etc/shadow ]; then
            mkdir -p profile/airootfs/etc
            echo "root::14871::::::" | sudo tee profile/airootfs/etc/shadow
          fi

          # 7. Build the ISO
          mkdir -p ./output
          sudo mkarchiso -v -w /tmp/archiso-tmp -o ./output ./profile

      - name: Upload BhagwaOS ISO
        uses: actions/upload-artifact@v4
        with:
          name: BhagwaOS-Live-ISO
          path: output/*.iso
