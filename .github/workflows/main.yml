name: BhagwaOS Build
on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows you to trigger it manually from the UI

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # This tells GitHub to allow the script to create a release
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Arch Linux Environment
        uses: RangHo/setup-arch@v1
        with:
          packages: archiso git base-devel wget

      - name: Build BhagwaOS ISO
        shell: arch.sh {0}
        run: |
          sudo pacman-key --init
          sudo pacman-key --populate archlinux
          sudo pacman -Sy --noconfirm
          cp -rv /usr/share/archiso/configs/releng/* ./profile/
          git checkout ./profile/packages.x86_64
          git checkout ./profile/profiledef.sh
          git checkout ./profile/pacman.conf
          # Cleanup Calamares/Chaotic if present
          sed -i '/calamares/d' profile/packages.x86_64
          sed -i '/chaotic/d' profile/packages.x86_64
          # Bootloader Injection
          for pkg in syslinux memtest86+ memtest86+-efi edk2-shell; do
            grep -qxF "$pkg" profile/packages.x86_64 || echo "$pkg" >> profile/packages.x86_64
          done
          mkdir -p profile/airootfs/etc/sudoers.d profile/airootfs/root
          echo "root::14871::::::" | sudo tee profile/airootfs/etc/shadow
          mkdir -p ./output
          sudo mkarchiso -v -w /tmp/archiso-tmp -o ./output ./profile

      - name: Push to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: output/*.iso
          tag_name: "v0.${{ github.run_number }}"
          name: "BhagwaOS Build #${{ github.run_number }}"
          body: |
            ### 🚩 BhagwaOS Auto-Build
            This release was automatically generated by the GitHub Actions workflow.
            - **Build Number:** ${{ github.run_number }}
            - **Base:** Arch Linux
            - **Desktop:** Hyprland & XFCE4
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # This is built-in; you don't need to create it!
