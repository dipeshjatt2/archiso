name: BhagwaOS Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Crucial: Allows the script to create a Release
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Arch Linux Environment
        uses: RangHo/setup-arch@v1
        with:
          packages: archiso git base-devel wget

      - name: Build BhagwaOS ISO
        shell: arch.sh {0}
        run: |
          sudo pacman-key --init
          sudo pacman-key --populate archlinux
          sudo pacman -Sy --noconfirm
          cp -rv /usr/share/archiso/configs/releng/* ./profile/
          git checkout ./profile/packages.x86_64
          git checkout ./profile/profiledef.sh
          git checkout ./profile/pacman.conf
          sed -i '/calamares/d' profile/packages.x86_64
          sed -i '/chaotic/d' profile/packages.x86_64
          for pkg in syslinux memtest86+ memtest86+-efi edk2-shell; do
            grep -qxF "$pkg" profile/packages.x86_64 || echo "$pkg" >> profile/packages.x86_64
          done
          mkdir -p profile/airootfs/etc/sudoers.d profile/airootfs/root
          echo "root::14871::::::" | sudo tee profile/airootfs/etc/shadow
          mkdir -p ./output
          sudo mkarchiso -v -w /tmp/archiso-tmp -o ./output ./profile

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BhagwaOS-Live-ISO
          path: output/*.iso

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: output/*.iso
          tag_name: ${{ github.ref_name }}
          name: "BhagwaOS Release ${{ github.ref_name }}"
          body: |
            ## 🚩 BhagwaOS Official Build
            **Base:** Arch Linux
            **Desktop:** Hyprland & XFCE4
            **Theme:** Saffron / Bhagwa Modern
            
            *Note: This is a Live ISO. Use `sudo archinstall` to install.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
